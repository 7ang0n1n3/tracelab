services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - INTERNAL_API_URL=http://backend:4000
    ports:
      - "${FRONTEND_PORT:-3273}:3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      - DATABASE_PATH=/data/db/tracelab.db
      - ARTIFACTS_PATH=/data/artifacts
      - AUTH_STATE_PATH=/data/auth
      - RUNNER_URL=http://runner:5000
      - RUNNER_NOVNC_PORT=${NOVNC_PORT:-6080}
      - RUNNER_SECRET=${RUNNER_SECRET:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3273}
      - PORT=4000
    volumes:
      - ./data:/data
    depends_on:
      - runner
    restart: unless-stopped

  runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    ports:
      - "${RUNNER_PORT:-5000}:5000"
      - "${NOVNC_PORT:-6080}:6080"
    environment:
      - ARTIFACTS_PATH=/data/artifacts
      - AUTH_STATE_PATH=/data/auth
      - RUNNER_SECRET=${RUNNER_SECRET:-}
      - PORT=5000
      - DISPLAY=:99
      - NOVNC_PORT=6080
    volumes:
      - ./data:/data
    shm_size: "2gb"
    restart: unless-stopped
